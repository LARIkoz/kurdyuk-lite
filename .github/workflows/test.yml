name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  installer:
    name: installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run installer test suite
        run: bash test/run.sh
